name: Deploy landing page

# Publishes the static landing page in docs/ to GitHub Pages using the official
# GitHub Actions Pages deployment. The first run auto-enables Pages via the
# Actions token (enablement: true), so no manual "Settings -> Pages" toggle is
# required. Source stays in docs/ on master.

on:
  push:
    branches: [master]
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Permissions the GITHUB_TOKEN needs to enable + deploy Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & deploy docs/ to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages (auto-enable on first run)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload docs/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
