name: Deploy landing page

# Publishes the static landing page in docs/ to the gh-pages branch, which
# GitHub Pages serves. Source stays in docs/ on master; the built site lives on
# the gh-pages branch.

on:
  push:
    branches: [master]
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Only one deploy at a time; let an in-progress run finish.
concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Publish docs/ to gh-pages
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          # Quick Look "site" is plain static files; no Jekyll processing.
          enable_jekyll: false
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: "deploy: ${{ github.event.head_commit.message || 'manual dispatch' }}"
